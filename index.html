<!DOCTYPE html>
<!-- BUILD_VERSION 2026-07-22.3 -->
<!-- Conklin Live Translator — English speech -> selectable languages, for training sessions -->
<!-- 2026-07-22.3: Swahili added. Language selector bar - tap chips to choose which languages
     show in the live view; selection persists per device. Layout auto-scales: N columns in
     landscape / N rows in portrait, text size adjusts to the language count so it stays
     readable. Adding a future language = one entry in the LANGUAGES array in the script. -->
<!-- 2026-07-22.2: Conklin logo embedded directly in this file (base64) -->
<!-- 2026-07-22.1: header matched to the CNC generator framework, YYYY-MM-DD.BUILD format -->
<!-- 1.3.0: reviewable English transcript panel above the live caption bar -->
<!-- 1.2.0: fully responsive on any device/orientation -->
<!-- 1.1.0: rolling live translation while speaking (Meet-style) -->
<!-- Deploy on HTTPS (GitHub Pages). Microphone will NOT work over plain http or inside a chat preview iframe. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LIVE VOICE TRANSLATOR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14181C;
    --panel:#1B2127;
    --line:#2A323B;
    --text:#F2F0EB;
    --dim:#8B949E;
    --mic:#8FCF9B;  /* live mic / English — green */
    --err:#E87070;
    --phrase-scale:1;      /* user A+/A- */
    --count-scale:1;       /* shrinks as more languages are shown */
    --lang-count:2;
    --phrase-size:calc(clamp(24px, 5vmin, 58px) * var(--phrase-scale) * var(--count-scale));
    --en-size:calc(clamp(17px, 3vmin, 30px) * var(--phrase-scale));
    --ui-size:clamp(14px, 2.2vmin, 18px);
    --mono:ui-monospace,'SF Mono','Cascadia Mono','Roboto Mono',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Barlow',system-ui,-apple-system,sans-serif;
    display:flex;flex-direction:column;
    height:100vh;height:100dvh;
    overflow:hidden;
    -webkit-user-select:none;user-select:none;
    padding-left:env(safe-area-inset-left);
    padding-right:env(safe-area-inset-right);
  }

  /* ---------- top bar : CNC-generator framework ---------- */
  header{
    display:flex;align-items:center;gap:14px;
    padding:8px 16px;
    padding-top:calc(8px + env(safe-area-inset-top));
    border-bottom:1px solid var(--line);
    background:#0B0D0F;
    flex:0 0 auto;
  }
  .brand-block{display:flex;flex-direction:column;gap:2px;min-width:0}
  .app-title{
    font-weight:700;font-size:clamp(15px, 2.8vmin, 22px);
    letter-spacing:.02em;color:var(--text);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .app-sub{
    font-family:var(--mono);
    font-size:clamp(10px, 1.9vmin, 13px);letter-spacing:.08em;
    color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .build{
    font-family:var(--mono);
    font-size:clamp(9px, 1.6vmin, 11px);letter-spacing:.06em;
    color:#5A6470;
  }
  .spacer{flex:1}
  .controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  #status{
    font-family:'Barlow Condensed',sans-serif;
    font-size:clamp(13px, 2vmin, 16px);letter-spacing:.1em;text-transform:uppercase;
    color:var(--dim);white-space:nowrap;
  }
  #status.live{color:var(--mic)}
  #status.err{color:var(--err)}
  button{
    font-family:'Barlow Condensed',sans-serif;
    font-size:var(--ui-size);font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    background:none;border:1px solid var(--line);color:var(--text);
    border-radius:6px;padding:9px 14px;cursor:pointer;
    min-height:42px;
    touch-action:manipulation;
  }
  button:focus-visible{outline:2px solid var(--mic);outline-offset:2px}
  #toggle{border-color:var(--mic);color:var(--mic);min-width:clamp(90px, 16vmin, 130px)}
  #toggle.on{background:var(--mic);color:#14181C}
  .size-btn{min-width:48px;padding:8px 0;font-size:calc(var(--ui-size) + 2px)}

  .logo-block{
    display:flex;flex-direction:column;align-items:flex-end;gap:3px;
    flex:0 0 auto;
  }
  .logo-block img{
    height:clamp(26px, 5vmin, 40px);width:auto;display:block;
  }
  .logo-wordmark{
    display:none;
    font-weight:700;font-size:clamp(15px, 2.8vmin, 22px);letter-spacing:.04em;
    color:var(--text);white-space:nowrap;
  }
  .logo-wordmark small{
    display:block;font-weight:600;font-size:.45em;letter-spacing:.34em;color:var(--dim);
    text-align:right;
  }
  .logo-dev{
    font-family:var(--mono);
    font-size:clamp(8px, 1.6vmin, 11px);letter-spacing:.14em;
    color:var(--dim);white-space:nowrap;
  }

  /* ---------- language selector bar ---------- */
  #lang-bar{
    flex:0 0 auto;
    display:flex;align-items:center;gap:8px;
    padding:8px 16px;
    background:var(--panel);
    border-bottom:1px solid var(--line);
    overflow-x:auto;
  }
  #lang-bar .bar-label{
    font-family:'Barlow Condensed',sans-serif;
    font-size:clamp(12px, 2vmin, 15px);letter-spacing:.12em;text-transform:uppercase;
    color:var(--dim);white-space:nowrap;margin-right:4px;
  }
  .chip{
    font-family:'Barlow Condensed',sans-serif;
    font-size:clamp(14px, 2.2vmin, 17px);font-weight:600;letter-spacing:.08em;
    text-transform:uppercase;
    border:1px solid var(--chip, var(--line));
    color:var(--chip, var(--dim));
    background:none;border-radius:999px;
    padding:7px 16px;min-height:38px;cursor:pointer;
    white-space:nowrap;touch-action:manipulation;
    opacity:.45;
  }
  .chip.on{opacity:1;background:var(--chip);color:#14181C}

  /* ---------- translation columns ---------- */
  main{
    flex:1 1 auto;min-height:0;
    display:grid;
    grid-template-columns:repeat(var(--lang-count), 1fr);
  }
  .col{
    display:flex;flex-direction:column;min-height:0;
    border-left:1px solid var(--line);
  }
  .col:first-child,
  .col.hidden + .col:not(.hidden){border-left:none}
  .col.hidden{display:none}
  .col-head{
    flex:0 0 auto;
    display:flex;align-items:baseline;gap:10px;
    padding:10px 18px 8px;
    border-bottom:1px solid var(--line);
  }
  .col-head .code{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;font-size:clamp(18px, 3.2vmin, 26px);letter-spacing:.14em;
    color:var(--accent);
  }
  .col-head .lang{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:500;font-size:clamp(13px, 2.2vmin, 18px);letter-spacing:.1em;
    text-transform:uppercase;color:var(--dim);
  }
  .feed{
    flex:1 1 auto;min-height:0;
    overflow-y:auto;
    padding:12px 18px 20px;
    scroll-behavior:smooth;
  }
  .phrase{
    font-size:var(--phrase-size);
    line-height:1.3;font-weight:500;
    color:var(--dim);
    padding:6px 0 6px 14px;
    border-left:3px solid transparent;
    transition:color .4s;
  }
  .col .phrase.locked-last{color:var(--text);border-left-color:var(--accent)}
  .phrase.failed{color:var(--err);font-size:calc(var(--phrase-size)*.6)}

  .live-line{
    font-size:var(--phrase-size);
    line-height:1.3;font-weight:500;
    color:var(--text);opacity:.8;
    padding:6px 0 6px 14px;
    border-left:3px dashed var(--accent);
  }
  .live-line:empty{display:none}

  .empty-hint{
    color:var(--dim);font-size:clamp(15px, 2.6vmin, 20px);padding:6px 0 6px 14px;
  }

  /* ---------- English transcript (what was said) ---------- */
  #transcript{
    flex:0 0 auto;
    display:flex;flex-direction:column;
    border-top:1px solid var(--line);
    background:var(--bg);
  }
  #transcript .col-head{
    padding:8px 18px 6px;
  }
  #transcript .code{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;font-size:clamp(15px, 2.6vmin, 20px);letter-spacing:.14em;
    color:var(--mic);
  }
  #transcript .lang{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:500;font-size:clamp(12px, 2vmin, 15px);letter-spacing:.1em;
    text-transform:uppercase;color:var(--dim);
  }
  #feed-en{
    height:clamp(80px, 16vh, 150px);
    overflow-y:auto;
    padding:8px 18px 12px;
    scroll-behavior:smooth;
  }
  #feed-en .phrase{
    font-size:var(--en-size);
    padding:4px 0 4px 14px;
  }
  #feed-en .phrase.locked-last{color:var(--text);border-left-color:var(--mic)}
  #feed-en .empty-hint{font-size:clamp(13px, 2.2vmin, 16px);padding:4px 0 4px 14px}

  /* ---------- live English caption bar ---------- */
  footer{
    flex:0 0 auto;
    display:flex;align-items:center;gap:12px;
    padding:10px 18px;
    padding-bottom:calc(10px + env(safe-area-inset-bottom));
    background:var(--panel);
    border-top:1px solid var(--line);
    min-height:52px;
  }
  .mic-dot{
    flex:0 0 auto;width:13px;height:13px;border-radius:50%;
    background:var(--line);
  }
  .mic-dot.live{background:var(--mic);animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(143,207,155,.5)}
    50%{box-shadow:0 0 0 9px rgba(143,207,155,0)}
  }
  @media (prefers-reduced-motion:reduce){.mic-dot.live{animation:none}}
  #caption{
    font-size:clamp(15px, 2.8vmin, 24px);line-height:1.3;color:var(--dim);
    overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
  }
  #caption.talking{color:var(--text)}

  /* ---------- portrait: stack the languages top / bottom ---------- */
  @media (orientation:portrait){
    main{
      grid-template-columns:1fr;
      grid-template-rows:repeat(var(--lang-count), 1fr);
    }
    .col{border-left:none;border-top:1px solid var(--line)}
    .col:first-child,
    .col.hidden + .col:not(.hidden){border-top:none}
    #feed-en{height:clamp(70px, 13vh, 120px)}
  }

  /* narrow screens */
  @media (max-width:760px){
    .logo-block img{height:22px}
    .logo-dev{display:none}
  }
  @media (max-width:560px){
    .logo-block{display:none}
  }
  @media (max-width:480px){
    header{gap:8px;padding:6px 10px;padding-top:calc(6px + env(safe-area-inset-top))}
    #status{display:none}
    button{padding:8px 10px}
    .app-sub,.build{max-width:40vw}
  }
</style>
</head>

<div id="lang-bar">
  <span class="bar-label">Languages</span>
  <!-- chips generated from the LANGUAGES array -->
</div>

<section id="transcript">
  <div class="col-head"><span class="code">EN</span><span class="lang">What you said</span></div>
  <div id="feed-en"><div class="empty-hint">Your recognized speech appears here so you can check it.</div></div>
</section>

<footer>
  <div class="mic-dot" id="micdot"></div>
  <div id="caption">Tap Start, then speak in English.</div>
</footer>

<script>
"use strict";
const BUILD_VERSION = "2026-07-22.3";   /* format: YYYY-MM-DD.BUILD — bump every revision */
document.getElementById("build").textContent = "Build " + BUILD_VERSION;

/* =====================================================================
   LANGUAGES — to add a language in the future, add ONE entry here.
   code  = Google Translate language code (fr, es, sw, pt, de, ...)
   tag   = short badge shown in the column header and chip
   label = native-language name
   color = the language's accent color in the UI
   hint  = "translation appears here" in that language (shown when empty)
   ===================================================================== */
const LANGUAGES = [
  { code:"fr", tag:"FR", label:"Français",  color:"#7FB4E8", hint:"La traduction apparaît ici." },
  { code:"es", tag:"ES", label:"Español",   color:"#E8A25C", hint:"La traducción aparece aquí." },
  { code:"sw", tag:"SW", label:"Kiswahili", color:"#B48EDC", hint:"Tafsiri itaonekana hapa." }
];

const $ = id => document.getElementById(id);
const statusEl=$("status"), toggleBtn=$("toggle"), caption=$("caption"),
      micdot=$("micdot"), feedEN=$("feed-en"), colsEl=$("cols"), langBar=$("lang-bar");

let running=false, recognition=null, restartTimer=null;

/* ---------- language selection (persists per device) ---------- */
let active = new Set(LANGUAGES.map(l=>l.code));   // default: all on
try{
  const saved = JSON.parse(localStorage.getItem("clt_langs"));
  if(Array.isArray(saved)){
    const valid = saved.filter(c=>LANGUAGES.some(l=>l.code===c));
    if(valid.length) active = new Set(valid);
  }
}catch(e){}

const ui = {};   // per-language refs: ui[code] = {col, feed, live, chip}

function buildLanguageUI(){
  LANGUAGES.forEach(lang=>{
    /* chip */
    const chip = document.createElement("button");
    chip.className = "chip";
    chip.textContent = lang.tag + " " + lang.label;
    chip.style.setProperty("--chip", lang.color);
    chip.setAttribute("aria-pressed", "false");
    chip.onclick = ()=>toggleLang(lang.code);
    langBar.appendChild(chip);

    /* column */
    const col = document.createElement("section");
    col.className = "col";
    col.style.setProperty("--accent", lang.color);

    const head = document.createElement("div");
    head.className = "col-head";
    const code = document.createElement("span");
    code.className = "code"; code.textContent = lang.tag;
    const label = document.createElement("span");
    label.className = "lang"; label.textContent = lang.label;
    head.appendChild(code); head.appendChild(label);

    const feed = document.createElement("div");
    feed.className = "feed";
    const hint = document.createElement("div");
    hint.className = "empty-hint"; hint.textContent = lang.hint;
    const live = document.createElement("div");
    live.className = "live-line";
    feed.appendChild(hint); feed.appendChild(live);

    col.appendChild(head); col.appendChild(feed);
    colsEl.appendChild(col);

    ui[lang.code] = { col, feed, live, chip };
  });
  applySelection();
}

function toggleLang(code){
  if(active.has(code)){
    if(active.size === 1) return;      // keep at least one language on
    active.delete(code);
  }else{
    active.add(code);
  }
  try{ localStorage.setItem("clt_langs", JSON.stringify([...active])); }catch(e){}
  applySelection();
}

function applySelection(){
  LANGUAGES.forEach(lang=>{
    const on = active.has(lang.code);
    ui[lang.code].col.classList.toggle("hidden", !on);
    ui[lang.code].chip.classList.toggle("on", on);
    ui[lang.code].chip.setAttribute("aria-pressed", on ? "true" : "false");
  });
  const n = active.size;
  document.documentElement.style.setProperty("--lang-count", n);
  /* more languages on screen -> smaller base text so columns stay readable */
  const countScale = n <= 1 ? 1.15 : n === 2 ? 1 : n === 3 ? 0.85 : n === 4 ? 0.75 : 0.68;
  document.documentElement.style.setProperty("--count-scale", countScale);
  /* subtitle reflects the current selection, generator-style */
  const parts = LANGUAGES.filter(l=>active.has(l.code)).map(l=>l.label.toUpperCase());
  $("app-sub").textContent = "EN → " + parts.join(" + ") + " · TRAINING · WESM";
}

const activeLangs = ()=>LANGUAGES.filter(l=>active.has(l.code));

/* ---------- logo fallback ---------- */
const logoImg = $("logo-img");
logoImg.onerror = ()=>{
  logoImg.style.display = "none";
  $("logo-wordmark").style.display = "block";
};

/* ---------- text scale (multiplier on the fluid base size) ---------- */
let phraseScale = 1;
try{ phraseScale = parseFloat(localStorage.getItem("clt_scale")) || 1; }catch(e){}
applyScale();
function applyScale(){
  phraseScale = Math.min(1.8, Math.max(0.55, phraseScale));
  document.documentElement.style.setProperty("--phrase-scale", phraseScale);
  try{ localStorage.setItem("clt_scale", phraseScale); }catch(e){}
}
$("bigger").onclick = ()=>{ phraseScale += 0.12; applyScale(); };
$("smaller").onclick = ()=>{ phraseScale -= 0.12; applyScale(); };

$("clear").onclick = ()=>{
  const feeds = [feedEN, ...LANGUAGES.map(l=>ui[l.code].feed)];
  feeds.forEach(f=>f.querySelectorAll(".phrase,.empty-hint").forEach(n=>n.remove()));
  LANGUAGES.forEach(l=>{ ui[l.code].live.textContent = ""; });
  caption.textContent = running ? "Listening…" : "Tap Start, then speak in English.";
  caption.classList.remove("talking");
};

/* ---------- translation ----------
   Primary: Google's public gtx endpoint (no key). Unofficial — if it ever
   stops working, finalized phrases fall back to MyMemory automatically.
   The rolling live line uses the Google endpoint only (the fallback is
   too slow / rate-limited for several requests per second).              */
async function translateGoogle(text, target){
  const u = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl="
          + target + "&dt=t&q=" + encodeURIComponent(text);
  const r = await fetch(u);
  if(!r.ok) throw new Error(r.status);
  const d = await r.json();
  return d[0].map(seg=>seg[0]).join("");
}
async function translateFinal(text, target){
  try{ return await translateGoogle(text, target); }
  catch(e){
    try{
      const u = "https://api.mymemory.translated.net/get?q=" + encodeURIComponent(text)
              + "&langpair=en|" + target;
      const r = await fetch(u);
      const d = await r.json();
      if(d.responseData && d.responseData.translatedText) return d.responseData.translatedText;
    }catch(e2){}
    return null;
  }
}

/* ---------- feeds ---------- */
function addPhrase(feed, liveEl, text, cls){
  const hint = feed.querySelector(".empty-hint");
  if(hint) hint.remove();
  feed.querySelectorAll(".phrase.locked-last").forEach(n=>n.classList.remove("locked-last"));
  const div = document.createElement("div");
  div.className = "phrase locked-last" + (cls ? " "+cls : "");
  div.textContent = text;
  if(liveEl) feed.insertBefore(div, liveEl);   // live line always stays last
  else feed.appendChild(div);
  const phrases = feed.querySelectorAll(".phrase");
  if(phrases.length > 40) phrases[0].remove(); // keep it light
  feed.scrollTop = feed.scrollHeight;
  return div;
}

/* ---------- rolling live translation ---------- */
const LIVE_THROTTLE_MS = 400;
let liveGen = 0;
const liveSeq = {};
LANGUAGES.forEach(l=>liveSeq[l.code]=0);
let liveTimer = null;
let latestInterim = "";
let lastSentInterim = "";

function scheduleLive(text){
  latestInterim = text;
  if(liveTimer) return;
  liveTimer = setTimeout(()=>{
    liveTimer = null;
    if(latestInterim && latestInterim !== lastSentInterim){
      lastSentInterim = latestInterim;
      fireLive(latestInterim);
    }
  }, LIVE_THROTTLE_MS);
}

function fireLive(text){
  const gen = liveGen;
  activeLangs().forEach(lang=>{
    const seq = ++liveSeq[lang.code];
    translateGoogle(text, lang.code).then(res=>{
      if(gen !== liveGen || seq !== liveSeq[lang.code] || !res) return; // stale — drop
      const {feed, live} = ui[lang.code];
      const hint = feed.querySelector(".empty-hint");
      if(hint) hint.remove();
      live.textContent = res;
      feed.scrollTop = feed.scrollHeight;
    }).catch(()=>{});  // live line just skips a beat on failure
  });
}

function clearLive(){
  liveGen++;                     // invalidate all in-flight live requests
  clearTimeout(liveTimer); liveTimer = null;
  latestInterim = ""; lastSentInterim = "";
  LANGUAGES.forEach(l=>{ ui[l.code].live.textContent = ""; });
}

/* ---------- finalized phrases ---------- */
async function handleFinal(text){
  text = text.trim();
  if(!text) return;
  clearLive();
  addPhrase(feedEN, null, text);              // English transcript — the record of what was said
  const langs = activeLangs();
  const pending = langs.map(lang=>addPhrase(ui[lang.code].feed, ui[lang.code].live, "…"));
  const results = await Promise.all(langs.map(lang=>translateFinal(text, lang.code)));
  langs.forEach((lang, i)=>fillPhrase(pending[i], results[i], ui[lang.code].feed));
}
function fillPhrase(el, result, feed){
  if(result){ el.textContent = result; }
  else{ el.classList.add("failed"); el.textContent = "⚠ Translation unavailable — check the internet connection."; }
  feed.scrollTop = feed.scrollHeight;
}

/* ---------- speech recognition ---------- */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

function setStatus(txt, cls){
  statusEl.textContent = txt;
  statusEl.className = cls || "";
}

function buildRecognizer(){
  const rec = new SR();
  rec.lang = "en-US";
  rec.continuous = true;
  rec.interimResults = true;

  rec.onresult = (ev)=>{
    let interim = "";
    for(let i=ev.resultIndex; i<ev.results.length; i++){
      const res = ev.results[i];
      if(res.isFinal){ handleFinal(res[0].transcript); }
      else{ interim += res[0].transcript; }
    }
    if(interim){
      caption.textContent = interim;
      caption.classList.add("talking");
      scheduleLive(interim);
    }else{
      caption.textContent = "Listening…";
      caption.classList.remove("talking");
    }
  };

  rec.onerror = (ev)=>{
    if(ev.error === "not-allowed" || ev.error === "service-not-allowed"){
      stopAll();
      setStatus("Mic blocked", "err");
      caption.textContent = "Microphone access was denied. Allow the mic in browser settings (on iPhone/iPad: also check Settings → Siri & Search → Enable Dictation), then tap Start again.";
    }
    // "no-speech" and "aborted" are routine — the restart logic handles them.
  };

  rec.onend = ()=>{
    // Browsers stop recognition periodically; restart while running.
    if(running){
      clearTimeout(restartTimer);
      restartTimer = setTimeout(()=>{ try{ rec.start(); }catch(e){} }, 250);
    }
  };
  return rec;
}

function startAll(){
  running = true;
  recognition = buildRecognizer();
  try{ recognition.start(); }catch(e){}
  toggleBtn.textContent = "Stop";
  toggleBtn.classList.add("on");
  micdot.classList.add("live");
  setStatus("Listening", "live");
  caption.textContent = "Listening…";
}

function stopAll(){
  running = false;
  clearTimeout(restartTimer);
  if(recognition){ try{ recognition.stop(); }catch(e){} recognition = null; }
  clearLive();
  toggleBtn.textContent = "Start";
  toggleBtn.classList.remove("on");
  micdot.classList.remove("live");
  setStatus("Idle");
  caption.classList.remove("talking");
  caption.textContent = "Tap Start, then speak in English.";
}

/* ---------- browser support guidance ---------- */
buildLanguageUI();

if(!SR){
  toggleBtn.disabled = true;
  setStatus("Not supported", "err");
  const ua = navigator.userAgent;
  let advice;
  if(/Firefox/i.test(ua)){
    advice = "Firefox doesn't support speech recognition. Open this page in Chrome or Edge instead (Safari on Apple devices).";
  }else if(/Linux/i.test(ua) && /Chromium/i.test(ua)){
    advice = "This Chromium build lacks Google's speech service. Install official Google Chrome and open the page there.";
  }else{
    advice = "This browser has no speech recognition. Open this page in Chrome or Edge (Safari on Apple devices).";
  }
  caption.textContent = advice;
}else{
  toggleBtn.onclick = ()=> running ? stopAll() : startAll();
}
</script>
</body>
</html>
