<!DOCTYPE html>
<!-- BUILD_VERSION 1.1.0 -->
<!-- Conklin Live Translator — English speech -> French + Spanish, for training sessions -->
<!-- 1.1.0: rolling live translation while speaking (Meet-style), build number shown under title -->
<!-- Deploy on HTTPS (GitHub Pages). Microphone will NOT work over plain http or inside a chat preview iframe. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Conklin Live Translator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14181C;
    --panel:#1B2127;
    --line:#2A323B;
    --text:#F2F0EB;
    --dim:#8B949E;
    --fr:#7FB4E8;   /* French channel — blue  */
    --es:#E8A25C;   /* Spanish channel — amber */
    --mic:#8FCF9B;  /* live mic — green */
    --err:#E87070;
    --phrase-size:40px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Barlow',system-ui,-apple-system,sans-serif;
    display:flex;flex-direction:column;
    height:100vh;height:100dvh;
    overflow:hidden;
    -webkit-user-select:none;user-select:none;
  }

  /* ---------- top bar ---------- */
  header{
    display:flex;align-items:center;gap:14px;
    padding:8px 18px;
    border-bottom:1px solid var(--line);
    background:var(--panel);
    flex:0 0 auto;
  }
  .brand-block{display:flex;flex-direction:column;gap:1px}
  .brand{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;font-size:20px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--dim);
    white-space:nowrap;
  }
  .brand b{color:var(--text);font-weight:600}
  .build{
    font-family:'Barlow Condensed',sans-serif;
    font-size:12px;letter-spacing:.14em;color:var(--dim);
    text-transform:uppercase;
  }
  #status{
    font-family:'Barlow Condensed',sans-serif;
    font-size:16px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--dim);white-space:nowrap;
  }
  #status.live{color:var(--mic)}
  #status.err{color:var(--err)}
  .spacer{flex:1}
  button{
    font-family:'Barlow Condensed',sans-serif;
    font-size:18px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    background:none;border:1px solid var(--line);color:var(--text);
    border-radius:6px;padding:10px 18px;cursor:pointer;
    touch-action:manipulation;
  }
  button:focus-visible{outline:2px solid var(--mic);outline-offset:2px}
  #toggle{border-color:var(--mic);color:var(--mic);min-width:130px}
  #toggle.on{background:var(--mic);color:#14181C}
  .size-btn{min-width:52px;font-size:20px;padding:8px 0}

  /* ---------- translation columns ---------- */
  main{
    flex:1 1 auto;min-height:0;
    display:grid;grid-template-columns:1fr 1fr;
  }
  .col{
    display:flex;flex-direction:column;min-height:0;
  }
  .col + .col{border-left:1px solid var(--line)}
  .col-head{
    flex:0 0 auto;
    display:flex;align-items:baseline;gap:12px;
    padding:14px 22px 10px;
    border-bottom:1px solid var(--line);
  }
  .col-head .code{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;font-size:26px;letter-spacing:.14em;
  }
  .col-head .lang{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:500;font-size:18px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--dim);
  }
  #col-fr .code{color:var(--fr)}
  #col-es .code{color:var(--es)}
  .feed{
    flex:1 1 auto;min-height:0;
    overflow-y:auto;
    padding:18px 22px 26px;
    scroll-behavior:smooth;
  }
  .phrase{
    font-size:var(--phrase-size);
    line-height:1.3;font-weight:500;
    color:var(--dim);
    padding:8px 0 8px 16px;
    border-left:3px solid transparent;
    transition:color .4s;
  }
  .phrase.locked-last{color:var(--text)}
  #col-fr .phrase.locked-last{border-left-color:var(--fr)}
  #col-es .phrase.locked-last{border-left-color:var(--es)}
  .phrase.failed{color:var(--err);font-size:calc(var(--phrase-size)*.6)}

  /* rolling live translation line */
  .live-line{
    font-size:var(--phrase-size);
    line-height:1.3;font-weight:500;
    color:var(--text);opacity:.8;
    padding:8px 0 8px 16px;
    border-left:3px dashed var(--line);
    min-height:calc(var(--phrase-size)*1.3 + 16px);
  }
  .live-line:empty{display:none}
  #col-fr .live-line{border-left-color:var(--fr)}
  #col-es .live-line{border-left-color:var(--es)}

  .empty-hint{
    color:var(--dim);font-size:20px;padding:8px 0 8px 16px;
  }

  /* ---------- live English caption bar ---------- */
  footer{
    flex:0 0 auto;
    display:flex;align-items:center;gap:16px;
    padding:14px 22px;
    background:var(--panel);
    border-top:1px solid var(--line);
    min-height:64px;
  }
  .mic-dot{
    flex:0 0 auto;width:14px;height:14px;border-radius:50%;
    background:var(--line);
  }
  .mic-dot.live{background:var(--mic);animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(143,207,155,.5)}
    50%{box-shadow:0 0 0 9px rgba(143,207,155,0)}
  }
  @media (prefers-reduced-motion:reduce){.mic-dot.live{animation:none}}
  #caption{
    font-size:24px;line-height:1.3;color:var(--dim);
    overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
  }
  #caption.talking{color:var(--text)}

  @media (max-width:820px){ /* iPad portrait */
    :root{--phrase-size:30px}
  }
</style>
</head>
<body>

<header>
  <div class="brand-block">
    <div class="brand"><b>Conklin</b> Live Translator</div>
    <div class="build" id="build">Build —</div>
  </div>
  <div id="status">Idle</div>
  <div class="spacer"></div>
  <button class="size-btn" id="smaller" aria-label="Smaller text">A−</button>
  <button class="size-btn" id="bigger" aria-label="Larger text">A+</button>
  <button id="clear">Clear</button>
  <button id="toggle">Start</button>
</header>

<main>
  <section class="col" id="col-fr">
    <div class="col-head"><span class="code">FR</span><span class="lang">Français</span></div>
    <div class="feed" id="feed-fr">
      <div class="empty-hint">La traduction apparaît ici.</div>
      <div class="live-line" id="live-fr"></div>
    </div>
  </section>
  <section class="col" id="col-es">
    <div class="col-head"><span class="code">ES</span><span class="lang">Español</span></div>
    <div class="feed" id="feed-es">
      <div class="empty-hint">La traducción aparece aquí.</div>
      <div class="live-line" id="live-es"></div>
    </div>
  </section>
</main>

<footer>
  <div class="mic-dot" id="micdot"></div>
  <div id="caption">Tap Start, then speak in English.</div>
</footer>

<script>
"use strict";
const BUILD_VERSION = "1.1.0";
document.getElementById("build").textContent = "Build " + BUILD_VERSION;

const $ = id => document.getElementById(id);
const statusEl=$("status"), toggleBtn=$("toggle"), caption=$("caption"),
      micdot=$("micdot"), feedFR=$("feed-fr"), feedES=$("feed-es"),
      liveFR=$("live-fr"), liveES=$("live-es");

let running=false, recognition=null, restartTimer=null;

/* ---------- text size (persisted where allowed) ---------- */
let phraseSize = 40;
try{ phraseSize = parseInt(localStorage.getItem("clt_size")) || 40; }catch(e){}
applySize();
function applySize(){
  phraseSize = Math.min(84, Math.max(22, phraseSize));
  document.documentElement.style.setProperty("--phrase-size", phraseSize+"px");
  try{ localStorage.setItem("clt_size", phraseSize); }catch(e){}
}
$("bigger").onclick = ()=>{ phraseSize+=6; applySize(); };
$("smaller").onclick = ()=>{ phraseSize-=6; applySize(); };

$("clear").onclick = ()=>{
  feedFR.querySelectorAll(".phrase,.empty-hint").forEach(n=>n.remove());
  feedES.querySelectorAll(".phrase,.empty-hint").forEach(n=>n.remove());
  liveFR.textContent=""; liveES.textContent="";
  caption.textContent = running ? "Listening…" : "Tap Start, then speak in English.";
  caption.classList.remove("talking");
};

/* ---------- translation ----------
   Primary: Google's public gtx endpoint (no key). Unofficial — if it ever
   stops working, finalized phrases fall back to MyMemory automatically.
   The rolling live line uses the Google endpoint only (the fallback is
   too slow / rate-limited for 2-3 requests per second).                  */
async function translateGoogle(text, target){
  const u = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl="
          + target + "&dt=t&q=" + encodeURIComponent(text);
  const r = await fetch(u);
  if(!r.ok) throw new Error(r.status);
  const d = await r.json();
  return d[0].map(seg=>seg[0]).join("");
}
async function translateFinal(text, target){
  try{ return await translateGoogle(text, target); }
  catch(e){
    try{
      const u = "https://api.mymemory.translated.net/get?q=" + encodeURIComponent(text)
              + "&langpair=en|" + target;
      const r = await fetch(u);
      const d = await r.json();
      if(d.responseData && d.responseData.translatedText) return d.responseData.translatedText;
    }catch(e2){}
    return null;
  }
}

/* ---------- feeds ---------- */
function addPhrase(feed, liveEl, text, cls){
  const hint = feed.querySelector(".empty-hint");
  if(hint) hint.remove();
  feed.querySelectorAll(".phrase.locked-last").forEach(n=>n.classList.remove("locked-last"));
  const div = document.createElement("div");
  div.className = "phrase locked-last" + (cls ? " "+cls : "");
  div.textContent = text;
  feed.insertBefore(div, liveEl);           // live line always stays last
  const old = feed.querySelectorAll(".phrase");
  while(old.length > 40 && feed.firstChild !== liveEl){ feed.removeChild(feed.firstChild); break; }
  feed.scrollTop = feed.scrollHeight;
  return div;
}

/* ---------- rolling live translation ----------
   While the speaker talks, the interim English text is re-translated on a
   400ms throttle. A generation counter (bumped on every finalized phrase)
   plus a per-language sequence number makes sure a stale in-flight result
   can never overwrite the live line after things have moved on.          */
const LIVE_THROTTLE_MS = 400;
let liveGen = 0;
let liveSeq = { fr:0, es:0 };
let liveTimer = null;
let latestInterim = "";
let lastSentInterim = "";

function scheduleLive(text){
  latestInterim = text;
  if(liveTimer) return;
  liveTimer = setTimeout(()=>{
    liveTimer = null;
    if(latestInterim && latestInterim !== lastSentInterim){
      lastSentInterim = latestInterim;
      fireLive(latestInterim);
    }
  }, LIVE_THROTTLE_MS);
}

function fireLive(text){
  const gen = liveGen;
  ["fr","es"].forEach(lang=>{
    const seq = ++liveSeq[lang];
    translateGoogle(text, lang).then(res=>{
      if(gen !== liveGen || seq !== liveSeq[lang] || !res) return; // stale — drop
      const el = (lang==="fr") ? liveFR : liveES;
      const feed = (lang==="fr") ? feedFR : feedES;
      const hint = feed.querySelector(".empty-hint");
      if(hint) hint.remove();
      el.textContent = res;
      feed.scrollTop = feed.scrollHeight;
    }).catch(()=>{});  // live line just skips a beat on failure
  });
}

function clearLive(){
  liveGen++;                     // invalidate all in-flight live requests
  clearTimeout(liveTimer); liveTimer = null;
  latestInterim = ""; lastSentInterim = "";
  liveFR.textContent = ""; liveES.textContent = "";
}

/* ---------- finalized phrases ---------- */
async function handleFinal(text){
  text = text.trim();
  if(!text) return;
  clearLive();
  const pFR = addPhrase(feedFR, liveFR, "…");
  const pES = addPhrase(feedES, liveES, "…");
  const [fr, es] = await Promise.all([translateFinal(text,"fr"), translateFinal(text,"es")]);
  fillPhrase(pFR, fr, feedFR);
  fillPhrase(pES, es, feedES);
}
function fillPhrase(el, result, feed){
  if(result){ el.textContent = result; }
  else{ el.classList.add("failed"); el.textContent = "⚠ Translation unavailable — check the internet connection."; }
  feed.scrollTop = feed.scrollHeight;
}

/* ---------- speech recognition ---------- */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

function setStatus(txt, cls){
  statusEl.textContent = txt;
  statusEl.className = cls || "";
}

function buildRecognizer(){
  const rec = new SR();
  rec.lang = "en-US";
  rec.continuous = true;
  rec.interimResults = true;

  rec.onresult = (ev)=>{
    let interim = "";
    for(let i=ev.resultIndex; i<ev.results.length; i++){
      const res = ev.results[i];
      if(res.isFinal){ handleFinal(res[0].transcript); }
      else{ interim += res[0].transcript; }
    }
    if(interim){
      caption.textContent = interim;
      caption.classList.add("talking");
      scheduleLive(interim);
    }else{
      caption.textContent = "Listening…";
      caption.classList.remove("talking");
    }
  };

  rec.onerror = (ev)=>{
    if(ev.error === "not-allowed" || ev.error === "service-not-allowed"){
      stopAll();
      setStatus("Mic blocked", "err");
      caption.textContent = "Microphone access was denied. Allow the mic in browser settings (on iPad: also check Settings → Siri & Search → Enable Dictation), then tap Start again.";
    }
    // "no-speech" and "aborted" are routine — the restart logic handles them.
  };

  rec.onend = ()=>{
    // Safari/Chrome stop recognition periodically; restart while running.
    if(running){
      clearTimeout(restartTimer);
      restartTimer = setTimeout(()=>{ try{ rec.start(); }catch(e){} }, 250);
    }
  };
  return rec;
}

function startAll(){
  running = true;
  recognition = buildRecognizer();
  try{ recognition.start(); }catch(e){}
  toggleBtn.textContent = "Stop";
  toggleBtn.classList.add("on");
  micdot.classList.add("live");
  setStatus("Listening", "live");
  caption.textContent = "Listening…";
}

function stopAll(){
  running = false;
  clearTimeout(restartTimer);
  if(recognition){ try{ recognition.stop(); }catch(e){} recognition = null; }
  clearLive();
  toggleBtn.textContent = "Start";
  toggleBtn.classList.remove("on");
  micdot.classList.remove("live");
  setStatus("Idle");
  caption.classList.remove("talking");
  caption.textContent = "Tap Start, then speak in English.";
}

if(!SR){
  toggleBtn.disabled = true;
  setStatus("Not supported", "err");
  caption.textContent = "This browser has no speech recognition. Use Safari on iPad, or Chrome / Edge on the display PC.";
}else{
  toggleBtn.onclick = ()=> running ? stopAll() : startAll();
}
</script>
</body>
</html>
